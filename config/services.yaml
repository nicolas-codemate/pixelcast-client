# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    _instanceof:
        App\Simulator\State\ResettableState:
            tags: ['app.simulator_state']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    Nyholm\Psr7\Factory\Psr17Factory: ~

    Psr\Http\Message\ServerRequestFactoryInterface: '@Nyholm\Psr7\Factory\Psr17Factory'
    Psr\Http\Message\StreamFactoryInterface: '@Nyholm\Psr7\Factory\Psr17Factory'
    Psr\Http\Message\UploadedFileFactoryInterface: '@Nyholm\Psr7\Factory\Psr17Factory'
    Psr\Http\Message\ResponseFactoryInterface: '@Nyholm\Psr7\Factory\Psr17Factory'

    Symfony\Bridge\PsrHttpMessage\Factory\PsrHttpFactory: ~

    App\Simulator\Validation\OpenApiValidatorFactory: ~

    League\OpenAPIValidation\PSR7\ServerRequestValidator:
        factory: ['@App\Simulator\Validation\OpenApiValidatorFactory', 'create']
        arguments:
            $specPath: '%kernel.project_dir%/sync/openapi.yaml'

    App\Tui\Scenarios\Validation\OutboundOpenApiValidatorFactory: ~

    league_openapi_psr7_validator.outbound_request_validator:
        class: League\OpenAPIValidation\PSR7\RequestValidator
        factory: ['@App\Tui\Scenarios\Validation\OutboundOpenApiValidatorFactory', 'create']

    App\Tui\Scenarios\Validation\OutboundPayloadValidator:
        arguments:
            $validator: '@league_openapi_psr7_validator.outbound_request_validator'

    App\Tui\Scenarios\Transport\ScenarioHttpClient: ~

    App\Tui\Scenarios\Transport\ScenarioTransport: '@App\Tui\Scenarios\Transport\ScenarioHttpClient'

    App\Tui\DeviceStatus\StatsHttpClient: ~

    App\Tui\DeviceStatus\StatsTransport: '@App\Tui\DeviceStatus\StatsHttpClient'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
