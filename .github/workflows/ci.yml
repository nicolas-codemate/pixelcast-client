name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    name: Lint, format, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: apcu, ctype, iconv, intl, opcache, zip
          tools: composer:v2
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php8.5-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php8.5-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Warm Symfony container (needed by phpstan-symfony)
        run: bin/console cache:warmup --env=dev
        env:
          APP_ENV: dev
          APP_DEBUG: '1'

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction
        env:
          PHP_CS_FIXER_IGNORE_ENV: 1

      - name: PHPUnit
        run: vendor/bin/phpunit --colors=never
